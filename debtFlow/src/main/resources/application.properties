spring.application.name=debtFlow

# Deshabilita el Docker Compose support interno (ya corremos dentro de Docker)
spring.docker.compose.enabled=false

# DataSource Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/debtflow}
spring.datasource.username=${DB_USER:debtflow_user}
spring.datasource.password=${DB_PASS:debtflow_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Virtual Threads - Java 21
spring.threads.virtual.enabled=true

# Security Configuration
spring.security.user.name=${SECURITY_USER:admin}
spring.security.user.password=${SECURITY_PASS:admin123}

# Server Configuration
server.port=${PORT:8080}
spring.web.error.include-message=always

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging Configuration
logging.level.com.debtflow=DEBUG
logging.level.org.hibernate.SQL=WARN

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:AIzaSyAJ9KKxE7yMGKtp-z_KJ3MtgSS6wbJubwE}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent